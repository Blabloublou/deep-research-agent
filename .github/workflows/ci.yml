name: CI

on:
  #push:
  #  branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          echo "downloading Gradle 8.7"
          GRADLE_VERSION=8.7
          curl -sL https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip -o gradle.zip
          unzip -q gradle.zip -d "$HOME"
          export PATH="$HOME/gradle-${GRADLE_VERSION}/bin:$PATH"
          gradle --version
          gradle --no-daemon test


